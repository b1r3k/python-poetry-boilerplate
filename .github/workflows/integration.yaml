name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: mv .env.example .env

      - name: remove alembic versions
        run: rm -rf alembic/versions/*

      - name: create alembic migration from scratch
        run: docker compose run --rm web-worker poetry run alembic revision --autogenerate -m "Initial migration"

      - name: Set up Docker Compose
        run: docker compose up -d --build

      - name: Wait for web-worker to complete
        run: |
          echo "Waiting for Alembic migrations to finish..."
          timeout 120s bash -c \
            'until [ "$(docker inspect -f "{{.State.Running}}" $(docker-compose ps -q web-worker))" == "false" ]; do sleep 2; done'
          echo "Done."

      - name: Show logs (optional, for debugging)
        run: docker compose logs --no-color

      - name: Run integration tests
        run: docker compose run --rm web-worker poetry run pytest tests/integration/

      - name: Tear down
        if: always()
        run: docker compose down -v
